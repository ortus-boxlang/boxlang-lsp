name: Pull Requests

on:
  push:
    branches-ignore:
      - "main"
      - "master"
      - "development"
      - "releases/v*"
  pull_request:
    branches:
      - "releases/v*"
      - development

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    permissions: 
      checks: write
      issues: read
      pull-requests: write
      contents: read
    secrets: inherit

  # Format PR
  format_check:
    name: Checks Source Code Formatting
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      # - uses: Ortus-Solutions/commandbox-action@v1.0.2
      #   with:
      #     cmd: run-script format:check

      - name: Verify Code Formatting
        run: |
          chmod +x ./gradlew
          ./gradlew spotlessCheck

  # Verify generated docs are up to date
  verify_config_docs:
    name: Verify Config Docs Are Up To Date
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 21

      - name: Generate Config Docs And Lint Schema
        run: |
          chmod +x ./gradlew
          ./gradlew generateConfigDocs generateLintSchema

      - name: Fail if docs differ from checked-in version
        run: |
          git diff --exit-code docs/
